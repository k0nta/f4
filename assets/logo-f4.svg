<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" role="img" aria-labelledby="title desc">
  <title id="title">Ф4 компьютерный клуб</title>
  <desc id="desc">Векторная версия логотипа Ф4 в фирменных цветах.</desc>
  <defs>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g font-family="Montserrat, Arial, sans-serif" font-weight="900" text-anchor="middle">
    <text x="268" y="161" font-size="150" fill="#1b2442" stroke="#1b2442" stroke-width="18">Ф4</text>
    <text x="258" y="151" font-size="150" fill="#fbbd2f" stroke="#fbbd2f" stroke-width="13">Ф4</text>
    <text x="246" y="138" font-size="150" fill="#2bb8ba" stroke="#101827" stroke-width="13" paint-order="stroke fill">Ф4</text>
    <text x="246" y="138" font-size="150" fill="#2bb8ba" stroke="#74f8ff" stroke-width="2.5" opacity=".7">Ф4</text>
  </g>

  <g filter="url(#soft-glow)">
    <text x="260" y="206" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="36" font-weight="900" text-anchor="middle">КОМПЬЮТЕРНЫЙ</text>
    <text x="260" y="244" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="36" font-weight="900" text-anchor="middle">КЛУБ</text>
  </g>

  <g transform="translate(126 215)" fill="none" stroke-linejoin="round" stroke-width="9">
    <path d="M5 15h30l16 13-16 13H5z" fill="#2bb8ba" stroke="#101827"/>
    <path d="M35 15h17v26H35z" fill="#fbbd2f" stroke="#101827"/>
  </g>

  <g transform="translate(356 212)" fill="none" stroke="#101827" stroke-linejoin="round" stroke-width="8">
    <path d="M13 10h59c12 0 22 10 22 22v20H65l-9-11H30l-9 11H-8V32C-8 20 1 10 13 10z" fill="#fbbd2f"/>
    <path d="M28 25v26M15 38h26" stroke="#2bb8ba" stroke-linecap="square"/>
    <circle cx="64" cy="31" r="6" fill="#2bb8ba"/>
    <circle cx="80" cy="45" r="6" fill="#2bb8ba"/>
  </g>
</svg>
